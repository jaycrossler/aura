  # ── POV VARIANTS ────────────────────────────────────────────

  - id: gen_book01_ch002_mei_pov
    enabled: false
    kind: chapter_draft
    chapter_id: ch002
    render_profile: standard
    pov_override: mei
    pov_notes: >
      Mei is observing Jace through the secure-area glass at the drone center.
      She is assessing him — professional interest, no warmth yet.
      Clinical, controlled interiority. She notes his HUD, his posture, his
      reaction to the facility. She flags him to Sylvester before the chapter ends.
    overwrite: true
    note: "Mei POV variant of ch002 — the other side of the glass"

  - id: gen_book01_ch004_mei_pov
    enabled: false
    kind: chapter_draft
    chapter_id: ch004
    render_profile: standard
    pov_override: mei
    pov_notes: >
      Mei is watching (from a distance, not in the room) as the aftermath of
      Jace's diagnosis plays out. She has a file on him. She's seen this before.
      Her interiority is analytical — is he useful now, is he broken, will he adapt?
      She doesn't feel pity. She notes the corridor walk duration as data.
    overwrite: true
    note: "Mei POV variant of ch004 — the analyst watching the collapse"

