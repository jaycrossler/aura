book: book01
structure_file: control/story-structure.yaml
scene_registry: control/scene-registry.yaml
render_profiles: control/render-profiles.yaml

# ============================================================
# GENERATION QUEUE
#
# Each item references a chapter_id from story-structure.yaml
# and a render_profile id from render-profiles.yaml.
#
# Optional overrides per item:
#   pov_override: <character_id>     — override the chapter's pov_default
#   pov_notes: <string>              — guidance for the alternate POV
#   pass_type: <string>              — version pass label (default: raw_draft)
#   note: <string>                   — human note attached to this run
#
# enabled: false items are skipped by the runner.
# overwrite: false skips if any version already exists for the chapter.
# ============================================================

queue:

  # ── STANDARD PROSE — first pass all chapters ───────────────

  - id: gen_book01_ch001_standard_v1
    enabled: true
    kind: chapter_draft
    chapter_id: ch001
    render_profile: standard
    overwrite: false
    note: "First standard pass — Descent"

  - id: gen_book01_ch002_standard_v1
    enabled: false
    kind: chapter_draft
    chapter_id: ch002
